<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>韩国美食地图</title>
    <link rel="preconnect" href="https://dapi.kakao.com" />
    <link rel="preconnect" href="https://t1.daumcdn.net" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="map-panel" aria-label="韩国美食地图">
        <div id="map"></div>
        <div class="map-toolbar" aria-label="地图工具">
          <button class="icon-button" id="locateButton" type="button" title="定位到我附近">⌖</button>
          <button class="icon-button" id="seoulButton" type="button" title="回到首尔">◎</button>
        </div>
      </section>

      <aside class="control-panel" aria-label="美食点管理">
        <header class="panel-header">
          <div>
            <p class="eyebrow">Korea Food Map</p>
            <h1>韩国美食地图</h1>
            <p class="sync-status" id="syncStatus">正在连接数据...</p>
          </div>
          <span class="count-pill" id="placeCount">0</span>
        </header>

        <div class="search-row">
          <input id="searchInput" type="search" placeholder="搜索店名、地区、菜品" autocomplete="off" />
          <select id="categoryFilter" aria-label="分类筛选">
            <option value="all">全部</option>
            <option value="__idol__">★ 爱豆同款</option>
            <option value="韩餐">韩餐</option>
            <option value="烤肉">烤肉</option>
            <option value="街头小吃">街头小吃</option>
            <option value="咖啡甜品">咖啡甜品</option>
            <option value="海鲜">海鲜</option>
            <option value="酒馆">酒馆</option>
            <option value="日料">日料</option>
            <option value="中餐">中餐</option>
            <option value="西餐">西餐</option>
          </select>
        </div>

        <section class="address-search" aria-label="按地址或店名搜索">
          <div class="address-search-row">
            <input id="addressSearchInput" type="search" placeholder="输入韩语地址或店名定位（如：明洞 8길 27）" autocomplete="off" />
            <button id="addressSearchButton" type="button">搜索</button>
          </div>
          <div id="addressSearchResults" class="address-results" hidden></div>
        </section>

        <form class="place-form" id="placeForm">
          <div class="form-grid">
            <label>
              店名
              <input id="nameInput" name="name" required placeholder="例如：明洞饺子" />
            </label>
            <label>
              分类
              <select id="categoryInput" name="category">
                <option>韩餐</option>
                <option>烤肉</option>
                <option>街头小吃</option>
                <option>咖啡甜品</option>
                <option>海鲜</option>
                <option>酒馆</option>
                <option>日料</option>
                <option>中餐</option>
                <option>西餐</option>
              </select>
            </label>
          </div>

          <label class="idol-field">
            ★ 爱豆同款（可选）
            <input id="idolInput" name="idol" placeholder="哪个爱豆？比如 BTS RM、TWICE 나연——留空=非同款" autocomplete="off" />
          </label>

          <label>
            推荐菜 / 关键词
            <input id="dishInput" name="dish" placeholder="刀削面、猪蹄、鱼饼、拿铁..." />
          </label>

          <div class="form-grid">
            <label>
              评分
              <input id="ratingInput" name="rating" type="number" min="1" max="5" step="0.5" value="4.5" />
            </label>
            <label>
              人均 ₩
              <input id="priceInput" name="price" type="number" min="0" step="1000" placeholder="15000" />
            </label>
          </div>

          <label>
            推荐理由
            <textarea id="noteInput" name="note" rows="3" required placeholder="为什么推荐这家？必填——比如：刀切面汤底厚，吃完想喝光"></textarea>
          </label>

          <label class="photo-field">
            照片（可选）
            <input id="photoInput" name="photo" type="file" accept="image/*" />
          </label>
          <div id="photoPreview" class="photo-preview" hidden></div>

          <div class="coordinate-row">
            <span id="coordinateText">点击地图选择位置</span>
            <button id="clearDraftButton" type="button">清空</button>
          </div>

          <button class="primary-button" type="submit">添加到地图</button>
        </form>

        <section class="list-section" aria-label="地点列表">
          <div class="section-title">
            <h2>我的收藏</h2>
            <button id="resetButton" type="button">恢复示例</button>
          </div>
          <div class="place-list" id="placeList"></div>
        </section>
      </aside>
    </main>

    <template id="placeTemplate">
      <article class="place-card">
        <div class="place-thumb" data-empty="true" aria-hidden="true"></div>
        <button class="place-main" type="button">
          <span class="place-idol" hidden></span>
          <span class="place-title"></span>
          <span class="place-meta"></span>
          <span class="place-note"></span>
        </button>
        <button class="delete-button" type="button" title="删除">×</button>
      </article>
    </template>

    <script src="./config.js?v=20260521d"></script>
    <script src="./app.js?v=20260521j"></script>
  </body>
</html>
